name: Continuous Integration

# Pipeline kab chalegi: Jab bhi koi main branch par push kare ya Pull Request kholay
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub server par aap ka code pull karna
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Python install karna
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Dependencies install karna
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Linting (Code Style Check) karna - Agar code ganda hua to pipeline fail ho jaye gi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. Automated Tests run karna (Jo tests hum ne tests/ folder mein likhay hain)
    - name: Run tests with pytest
      run: |
        pytest